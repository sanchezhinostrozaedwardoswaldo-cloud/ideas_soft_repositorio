<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">

<!-- IMPORTANTE PARA RESPONSIVE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IdeasSoft - Iniciar Sesión</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="stylesheet" href="../css/main.css">

<style>

body{
    background-color:#f4f7f9;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;

    /* centra el login vertical y horizontal */
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* CONTENEDOR LOGIN */
.auth-container{
    width:100%;
    max-width:380px; /* tamaño normal en PC */
    padding:30px;
    border:1px solid #ddd;
    border-radius:10px;
    background:#fff;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

/* INPUTS */
.auth-form input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:6px;
    box-sizing:border-box;
    font-size:15px;
}

/* BOTON */
.btn-auth{
    width:100%;
    padding:12px;
    background:#365386;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
    font-size:15px;
}

.btn-auth:disabled{
    background:#7a8ca5;
    cursor:not-allowed;
}

/* TABLET */
@media (max-width:768px){

.auth-container{
    max-width:420px;
}

}

/* CELULAR */
@media (max-width:480px){

.auth-container{
    max-width:none;
    width:92%;
    padding:25px;
}

.auth-form input{
    padding:14px;
    font-size:16px;
}

.btn-auth{
    padding:14px;
    font-size:16px;
}

}

</style>
</head>

<body>

<div class="auth-container">

<div style="text-align:center;margin-bottom:20px;">
<i class="fas fa-user-circle" style="font-size:3rem;color:#365386;"></i>
<h2 style="color:#002e5b;margin-top:10px;">Bienvenido</h2>
</div>

<form class="auth-form" id="loginForm">

<input type="email" id="email" placeholder="Correo Electrónico" required>

<input type="password" id="password" placeholder="Contraseña" required>

<button type="submit" class="btn-auth">
Ingresar
</button>

</form>

<p style="text-align:center;font-size:0.8rem;margin-top:20px;">
¿No tienes cuenta?
<a href="registro.html" style="color:#4a6da7;">Regístrate aquí</a>
</p>

</div>

<script src="../js/auth.js"></script>

</body>
</html>
