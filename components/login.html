<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>IdeasSoft - Iniciar Sesión</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .auth-container {
            max-width: 350px;
            margin: 100px auto;
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .auth-form input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: #365386;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-auth:disabled {
            background: #7a8ca5;
            cursor: not-allowed;
        }
    </style>
</head>

<body style="background-color: #f4f7f9;">

<div class="auth-container">
    <div style="text-align: center; margin-bottom: 20px;">
        <i class="fas fa-user-circle" style="font-size: 3rem; color: #365386;"></i>
        <h2 style="color: #002e5b; margin-top: 10px;">Bienvenido</h2>
    </div>

    <!-- ✅ ID CORRECTO -->
    <form class="auth-form" id="loginForm">
        <input type="email" id="email" placeholder="Correo Electrónico" required>
        <input type="password" id="password" placeholder="Contraseña" required>

        <button type="submit" class="btn-auth">
            Ingresar
        </button>
    </form>

    <p style="text-align: center; font-size: 0.8rem; margin-top: 20px;">
        ¿No tienes cuenta?
        <a href="registro.html" style="color: #4a6da7;">Regístrate aquí</a>
    </p>
</div>

<!-- SOLO ESTO -->
<script src="../js/auth.js"></script>

</body>
</html>
