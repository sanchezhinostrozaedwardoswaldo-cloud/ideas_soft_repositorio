<script>
  function initHeader() {
  const toggle = document.getElementById('menuToggle');
  const menu = document.getElementById('navMenu');
  const icon = document.getElementById('hamburger-icon');

  // Si no encuentra los elementos, salimos para evitar errores
  if (!toggle || !menu || !icon) return;

  // Simplificamos: No clones el nodo a menos que sea estrictamente necesario
  // Solo removemos y agregamos el listener limpiamente
  toggle.onclick = (e) => {
    e.stopPropagation();
    const isOpen = menu.classList.toggle('active');
    
    // Cambiar ícono
    icon.className = isOpen ? 'fas fa-times' : 'fas fa-bars';
    toggle.setAttribute('aria-expanded', isOpen);
  };

  // ... resto de tu lógica de cerrar al clickear links ...
}
