<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeasSoft - Precios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>
<body>
    
    <div id="navbar"></div>

    <main>
        <!-- HERO -->
<section class="contact-hero">
    <div class="container">
        <p class="breadcrumb">Inicio / <span>Contacto</span></p>
        <h1>Estamos Aquí para Ayudarle</h1>
        <p class="hero-text">
            Envíenos un mensaje y le responderemos lo antes posible.
        </p>
    </div>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">
    <div class="container contact-grid">

        <!-- FORM -->
        <div class="contact-form">
            <form id="contactTicketForm">
    <div class="form-row">
        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="ticket_nombre" placeholder="Su nombre" required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="ticket_email" placeholder="correo@ejemplo.com" required>
        </div>
    </div>

    <div class="form-group">
        <label>Asunto</label>
        <input type="text" id="ticket_asunto" placeholder="¿En qué podemos ayudarle?" required>
    </div>

    <div class="form-group">
        <label>Mensaje</label>
        <textarea id="ticket_mensaje" rows="5" placeholder="Escriba su mensaje aquí..." required></textarea>
    </div>

    <button type="submit" class="btn-submit">
        <i class="fa-solid fa-paper-plane"></i>
        Enviar Mensaje
    </button>
</form>
        </div>

        <!-- INFO -->
        <div class="contact-info">

            <h3>Información de Contacto</h3>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <span>info@ideassoft.com</span>
            </div>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <span>+51 900 123 456</span>
            </div>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <span>Chimbote, Áncash, Perú</span>
            </div>

            <div class="schedule-box">
                <h4>Horario de Atención</h4>
                <p>Lunes a Viernes: 9:00 - 18:00</p>
                <p>Sábados: 10:00 - 14:00</p>
            </div>

        </div>

    </div>
    <section class="map-section">
    <div class="container">

        <div class="map-wrapper">
            <iframe 
                src="https://www.google.com/maps?q=Chimbote,+Perú&output=embed"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>

    </div>
</section>
</section>
    </main>

    <div id="footer"></div>

    <script src="../js/auth.js"></script> 

    <script src="../js/main.js"></script>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const form = document.querySelector('.contact-form form');
    if (!form) {
        console.error('No se encontró el formulario de contacto');
        return;
    }

    // 1. Crear el contenedor de mensajes de respuesta dinámicamente
    const btnSubmit = form.querySelector('.btn-submit');
    const resultado = document.createElement('div');
    resultado.id = 'form-resultado';
    resultado.className = 'mt-3 p-3 rounded text-center';
    resultado.style.display = 'none';
    form.appendChild(resultado);

    // 2. Escuchar el evento de envío
    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // Limpiar estado anterior y bloquear botón
        resultado.style.display = 'none';
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Enviando...';

        // 3. Capturar valores del formulario
        const nombre = form.querySelector('input[placeholder="Su nombre"]').value.trim();
        const email = form.querySelector('input[type="email"]').value.trim();
        const asuntoInput = form.querySelector('input[placeholder="¿En qué podemos ayudarle?"]').value.trim();
        const mensajeInput = form.querySelector('textarea').value.trim();

        // 4. Validación básica local
        if (!nombre || !email || !asuntoInput || !mensajeInput) {
            mostrarNotificacion('Por favor, completa todos los campos obligatorios.', 'error');
            resetearBoton();
            return;
        }

        // 5. Preparar los datos para la API (Query Parameters)
        // Construimos el cuerpo del mensaje incluyendo los datos de quien escribe
        const mensajeFormateado = `De: ${nombre} (${email})\n\nMensaje:\n${mensajeInput}`;
        
        const API_BASE = 'https://ideas-soft-backend.onrender.com';
        const params = new URLSearchParams({
            asunto: asuntoInput,
            mensaje: mensajeFormateado
        });

        const url = `${API_BASE}/soporte/tickets?${params.toString()}`;

        try {
            // 6. Obtener el token de LocalStorage (del auth.js)
            const token = localStorage.getItem('token');

            if (!token) {
                throw new Error("Debes estar logueado para enviar un ticket de soporte.");
            }

            // 7. Petición Fetch a la API
            const response = await fetch(url, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Authorization': `Bearer ${token}` // Inyectamos el token de seguridad
                }
            });

            const data = await response.json();

            if (response.ok) {
                // Éxito total
                mostrarNotificacion('¡Ticket enviado con éxito! Nos pondremos en contacto pronto.', 'success');
                form.reset();
            } else {
                // Manejo de errores específicos de la API (401, 422, etc)
                if (response.status === 401) {
                    throw new Error("Tu sesión ha expirado o no tienes permisos. Por favor, inicia sesión de nuevo.");
                }
                const errorDetail = data.detail?.[0]?.msg || data.detail || 'Hubo un error al procesar tu solicitud.';
                throw new Error(errorDetail);
            }

        } catch (err) {
            console.error('Error al enviar ticket:', err);
            mostrarNotificacion(err.message, 'error');
        } finally {
            resetearBoton();
        }
    });

    // Funciones auxiliares
    function mostrarNotificacion(texto, tipo) {
        resultado.textContent = texto;
        resultado.style.display = 'block';
        if (tipo === 'success') {
            resultado.style.backgroundColor = '#d1e7dd';
            resultado.style.color = '#0f5132';
            resultado.style.border = '1px solid #badbcc';
        } else {
            resultado.style.backgroundColor = '#f8d7da';
            resultado.style.color = '#842029';
            resultado.style.border = '1px solid #f5c2c7';
        }
    }

    function resetearBoton() {
        btnSubmit.disabled = false;
        btnSubmit.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Mensaje';
    }
});
    </script>
</body>
</html>
