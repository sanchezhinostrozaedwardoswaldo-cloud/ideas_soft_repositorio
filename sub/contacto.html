<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeasSoft - Precios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>

<body>

    <div id="navbar"></div>

    <main>
        <!-- HERO -->
        <section class="contact-hero">
            <div class="container">
                <p class="breadcrumb">Inicio / <span>Contacto</span></p>
                <h1>Estamos Aquí para Ayudarle</h1>
                <p class="hero-text">
                    Envíenos un mensaje y le responderemos lo antes posible.
                </p>
            </div>
        </section>

        <!-- CONTACT SECTION -->
        <section class="contact-section">
            <div class="container contact-grid">

                <!-- FORM -->
                <div class="contact-form">
                    <form id="contactTicketForm">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nombre</label>
                                <input type="text" id="ticket_nombre" placeholder="Su nombre" required>
                            </div>

                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" id="ticket_email" placeholder="correo@ejemplo.com" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Asunto</label>
                            <div class="form-group">
                                <label for="ticket_asunto">Asunto</label>
                                <select id="ticket_asunto" required class="form-control">
                                    <option value="" disabled selected>Seleccione una opción</option>
                                    <option value="Soporte Técnico">Soporte Técnico</option>
                                    <option value="Ventas / Presupuestos">Ventas / Presupuestos</option>
                                    <option value="Facturación">Facturación</option>
                                    <option value="Reclamos">Reclamos</option>
                                    <option value="Otros">Otros</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Mensaje</label>
                            <textarea id="ticket_mensaje" rows="5" placeholder="Escriba su mensaje aquí..."
                                required></textarea>
                        </div>

                        <button type="submit" class="btn-submit">
                            <i class="fa-solid fa-paper-plane"></i>
                            Enviar Mensaje
                        </button>
                    </form>
                </div>

                <!-- INFO -->
                <div class="contact-info">

                    <h3>Información de Contacto</h3>

                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa-regular fa-envelope"></i>
                        </div>
                        <span>info@ideassoft.com</span>
                    </div>

                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa-solid fa-phone"></i>
                        </div>
                        <span>+51 900 123 456</span>
                    </div>

                    <div class="info-item">
                        <div class="info-icon">
                            <i class="fa-solid fa-location-dot"></i>
                        </div>
                        <span>Chimbote, Áncash, Perú</span>
                    </div>

                    <div class="schedule-box">
                        <h4>Horario de Atención</h4>
                        <p>Lunes a Viernes: 9:00 - 18:00</p>
                        <p>Sábados: 10:00 - 14:00</p>
                    </div>

                </div>

            </div>
            <section class="map-section">
                <div class="container">

                    <div class="map-wrapper">
                        <iframe src="https://www.google.com/maps?q=Chimbote,+Perú&output=embed" allowfullscreen=""
                            loading="lazy">
                        </iframe>
                    </div>

                </div>
            </section>
        </section>
    </main>

<div id="footer"></div>

    <script src="../js/auth.js"></script>
    <script src="../js/navbar.js"></script> <script src="../js/main.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. Función para cargar componentes (Navbar y Footer)
    async function cargarComponentes() {
        try {
            const resNavbar = await fetch('../components/navbar.html');
            const dataNavbar = await resNavbar.text();
            document.getElementById('navbar').innerHTML = dataNavbar;

            // ✅ ACTUALIZAR ESTADO DE LOGIN (Cargar nombre/email en navbar)
            if (typeof window.actualizarNavbar === 'function') {
                window.actualizarNavbar();
            }

            // Inicializar hamburguesa
            if (typeof window.initHeader === 'function') {
                window.initHeader();
            }

            const resFooter = await fetch('../components/footer.html');
            const dataFooter = await resFooter.text();
            document.getElementById('footer').innerHTML = dataFooter;

            // Opcional: Autocompletar el email en el formulario si está logueado
            const savedEmail = localStorage.getItem('user_email');
            if (savedEmail && document.getElementById('ticket_email')) {
                document.getElementById('ticket_email').value = savedEmail;
            }

        } catch (error) {
            console.error("Error cargando componentes en Contacto:", error);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Ejecutar carga de componentes
        cargarComponentes();

        const form = document.querySelector('#contactTicketForm');
        const selectAsunto = document.getElementById('ticket_asunto');
        
        if (!form) return;

        // Lógica para capturar asunto desde la URL
        const urlParams = new URLSearchParams(window.location.search);
        const asuntoDesdeUrl = urlParams.get('asunto');
        if (asuntoDesdeUrl && selectAsunto) {
            selectAsunto.value = asuntoDesdeUrl;
        }

        // Preparar contenedor de resultados
        const btnSubmit = form.querySelector('.btn-submit');
        const resultado = document.createElement('div');
        resultado.id = 'form-resultado';
        resultado.className = 'mt-3 p-3 rounded text-center';
        resultado.style.display = 'none';
        form.appendChild(resultado);

        // Evento de envío del formulario
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            resultado.style.display = 'none';
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Enviando...';

            const nombre = document.getElementById('ticket_nombre').value.trim();
            const email = document.getElementById('ticket_email').value.trim();
            const asuntoInput = selectAsunto.value;
            const mensajeInput = document.getElementById('ticket_mensaje').value.trim();

            if (!nombre || !email || !asuntoInput || !mensajeInput) {
                mostrarNotificacion('Por favor, completa todos los campos.', 'error');
                resetearBoton();
                return;
            }

            const API_BASE = 'https://ideas-soft-backend.onrender.com';
            const params = new URLSearchParams({
                asunto: asuntoInput,
                mensaje: `De: ${nombre} (${email})\n\nMensaje:\n${mensajeInput}`
            });

            const url = `${API_BASE}/soporte/tickets?${params.toString()}`;

            try {
                const token = localStorage.getItem('token');
                
                // Si no hay token, avisamos que debe loguearse para soporte oficial
                if (!token) {
                    throw new Error("Debes iniciar sesión para enviar una solicitud de soporte.");
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/json',
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    mostrarNotificacion('¡Ticket enviado con éxito! Nos contactaremos pronto.', 'success');
                    form.reset();
                    // Volver a poner el email si sigue logueado
                    if(localStorage.getItem('user_email')) {
                        document.getElementById('ticket_email').value = localStorage.getItem('user_email');
                    }
                } else {
                    const errorDetail = data.detail || 'Error al procesar el ticket.';
                    throw new Error(errorDetail);
                }

            } catch (err) {
                mostrarNotificacion(err.message, 'error');
            } finally {
                resetearBoton();
            }
        });

        function mostrarNotificacion(texto, tipo) {
            resultado.textContent = texto;
            resultado.style.display = 'block';
            resultado.style.backgroundColor = (tipo === 'success') ? '#d1e7dd' : '#f8d7da';
            resultado.style.color = (tipo === 'success') ? '#0f5132' : '#842029';
        }

        function resetearBoton() {
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = '<i class="fa-solid fa-paper-plane"></i> Enviar Mensaje';
        }
    });
</script>
</body>

</html>
