<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeasSoft - Precios</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/contacto.css">
</head>
<body>
    
    <div id="navbar"></div>

    <main>
        <!-- HERO -->
<section class="contact-hero">
    <div class="container">
        <p class="breadcrumb">Inicio / <span>Contacto</span></p>
        <h1>Estamos Aquí para Ayudarle</h1>
        <p class="hero-text">
            Envíenos un mensaje y le responderemos lo antes posible.
        </p>
    </div>
</section>

<!-- CONTACT SECTION -->
<section class="contact-section">
    <div class="container contact-grid">

        <!-- FORM -->
        <div class="contact-form">
            <form>

                <div class="form-row">
                    <div class="form-group">
                        <label>Nombre</label>
                        <input type="text" placeholder="Su nombre">
                    </div>

                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" placeholder="correo@ejemplo.com">
                    </div>
                </div>

                <div class="form-group">
                    <label>Asunto</label>
                    <input type="text" placeholder="¿En qué podemos ayudarle?">
                </div>

                <div class="form-group">
                    <label>Mensaje</label>
                    <textarea rows="5" placeholder="Escriba su mensaje aquí..."></textarea>
                </div>

                <button type="submit" class="btn-submit">
                    <i class="fa-solid fa-paper-plane"></i>
                    Enviar Mensaje
                </button>

            </form>
        </div>

        <!-- INFO -->
        <div class="contact-info">

            <h3>Información de Contacto</h3>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-regular fa-envelope"></i>
                </div>
                <span>info@ideassoft.com</span>
            </div>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-phone"></i>
                </div>
                <span>+34 900 123 456</span>
            </div>

            <div class="info-item">
                <div class="info-icon">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
                <span>Chimbote, Áncash, Perú</span>
            </div>

            <div class="schedule-box">
                <h4>Horario de Atención</h4>
                <p>Lunes a Viernes: 9:00 - 18:00</p>
                <p>Sábados: 10:00 - 14:00</p>
            </div>

        </div>

    </div>
    <section class="map-section">
    <div class="container">

        <div class="map-wrapper">
            <iframe 
                src="https://www.google.com/maps?q=Chimbote,+Perú&output=embed"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>

    </div>
</section>
</section>
    </main>

    <div id="footer"></div>

    <script src="../js/auth.js"></script> 
    <script src="js/car.js"></script>
    <script src="../js/main.js"></script>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
