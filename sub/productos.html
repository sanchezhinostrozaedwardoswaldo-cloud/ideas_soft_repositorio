<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IdeasSoft - Nuestros Productos</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/productos.css">
</head>

<body>
    <div id="navbar"></div>

    <main>
        <section class="products-hero">
            <div class="container">
                <nav class="breadcrumb">Inicio / Productos</nav>
                <h1 style="color: white;">Tecnología que impulsa <br>tu crecimiento</h1>
                <p>Explore nuestra gama completa de software empresarial.</p>
            </div>
        </section>

        <section class="products-catalog">
            <div class="container">
                <div class="filter-bar">
                    <div class="filter-group">
                        <button class="filter-btn active" data-categoria="">Todos</button>
                        <button class="filter-btn" data-categoria="7">Gestión</button>
                        <button class="filter-btn" data-categoria="8">Ventas</button>
                        <button class="filter-btn" data-categoria="9">Analítica</button>

                        <select id="ordenar-productos" class="form-select d-inline-block w-auto ms-3">
                            <option value="">Ordenar por...</option>
                            <option value="precio_asc">Precio: Menor a Mayor</option>
                            <option value="precio_desc">Precio: Mayor a Menor</option>
                            <option value="mejor_calificados">Mejor Calificados</option>
                            <option value="mas_vendidos">Más Vendidos</option>
                        </select>
                    </div>
                </div>

                <div class="product-grid" id="product-container"></div>
            </div>
        </section>
    </main>

    <div id="footer"></div>

    <div class="modal fade" id="videoModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-0">
                    <h5 class="modal-title" id="videoTitle">Demo video del Software</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <div id="videoContainer" class="ratio ratio-16x9">
                    </div>
                </div>
            </div>
        </div>
    </div>

  
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

 <script src="../js/auth.js"></script>
<script src="../js/navbar.js"></script> 
<script src="../js/main.js"></script>

<script src="../js/productos.js"></script>

<script>
async function cargarComponentes() {
    try {
        console.log("1. Iniciando carga de componentes...");
        const resNavbar = await fetch('../components/navbar.html');
        document.getElementById('navbar').innerHTML = await resNavbar.text();
        console.log("2. Navbar inyectado");

        const resFooter = await fetch('../components/footer.html');
        document.getElementById('footer').innerHTML = await resFooter.text();
        console.log("3. Footer inyectado");

        // Un pequeño respiro para el navegador
        setTimeout(() => {
            console.log("4. Intentando Auth...");
            if (window.actualizarNavbar) {
                window.actualizarNavbar();
                console.log("✅ Auth ejecutado con éxito");
            }

            console.log("5. Intentando Productos...");
            if (window.inicializarPaginaProductos) {
                window.inicializarPaginaProductos();
                console.log("✅ Productos ejecutados con éxito");
            } else {
                console.error("❌ ERROR: La función inicializarPaginaProductos sigue sin detectarse.");
            }

            if (window.initHeader) window.initHeader();
        }, 100);

    } catch (error) {
        console.error("🚨 Error fatal:", error);
    }
}
document.addEventListener('DOMContentLoaded', cargarComponentes);
</script>
</body>

</html>
