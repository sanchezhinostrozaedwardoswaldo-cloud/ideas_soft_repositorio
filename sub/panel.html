<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IdeasSoft - Mi Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/panel.css">
</head>
<body>
      <div id="navbar"></div>


   <main>
    <br>
    <div class="main-wrapper bg-light">
        <div class="panel-hero py-5 bg-dark text-white text-center">
            <div class="container py-4">
                <h1 class="display-5 fw-bold mb-2">Mi Centro de Gestión</h1>
                <p class="lead opacity-75 mb-0">
                    Bienvenido de nuevo, <span id="user-display-email" class="text-primary fw-bold">senati@gmail.com</span>
                </p>
            </div>
        </div>

        <div class="container py-5 mt-5 mt-n4"> 
            <div class="row justify-content-center">
                <div class="col-lg-10"> <div class="nav-container mb-4">
                        <ul class="nav nav-tabs nav-justified border-0 shadow rounded-4 bg-white overflow-hidden" id="panelNav">
                            <li class="nav-item">
                                <button class="nav-link active py-3" onclick="cargarSeccion('licencias', event)">
                                    <i class="fas fa-key me-2 text-primary"></i> Mis Licencias
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link py-3" onclick="cargarSeccion('ventas', event)">
                                    <i class="fas fa-shopping-bag me-2 text-primary"></i> Compras
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link py-3" onclick="cargarSeccion('pagos', event)">
                                    <i class="fas fa-receipt me-2 text-primary"></i> Pagos
                                </button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link py-3" onclick="cargarSeccion('configuracion', event)">
                                    <i class="fas fa-user-gear me-2 text-primary"></i> Configuración
                                </button>
                            </li>
                        </ul>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4 bg-white">
                        <div class="card-header bg-white p-4 border-bottom d-flex justify-content-between align-items-center">
                            <h4 class="mb-0 fw-bold" id="section-title">Detalles de Licencias</h4>
                            <div id="loading-spinner" class="spinner-grow text-primary spinner-grow-sm" role="status" style="display:none;"></div>
                        </div>
                        <div class="card-body p-0">
                            <div id="data-container" class="table-responsive p-4">
                                <div class="text-center py-5 text-muted">
                                    <i class="fas fa-circle-notch fa-spin fa-2x mb-2 text-primary"></i>
                                    <p>Cargando información segura...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
        </div>
    </div>
</main>

  <div id="footer"></div>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/navbar.js"></script> <script src="panel.js"></script>
   <script>
    async function cargarComponentes() {
        try {
            // 1. Cargar Navbar y Footer en paralelo
            const [nav, foot] = await Promise.all([
                fetch('../components/navbar.html').then(r => r.text()),
                fetch('../components/footer.html').then(r => r.text())
            ]);
            
            // 2. Inyectar en el DOM
            document.getElementById('navbar').innerHTML = nav;
            document.getElementById('footer').innerHTML = foot;

            // 3. Ejecutar Lógica de Usuario (Email en navbar)
            if(window.actualizarNavbar) window.actualizarNavbar();

            // 4. INICIALIZAR HAMBURGUESA (navbar.js)
            // Esto es lo que activa el menú móvil
            if(window.initHeader) {
                window.initHeader();
            } else {
                console.warn("No se encontró la función initHeader en navbar.js");
            }

            // 5. Mostrar email del usuario en el Panel Hero
            const userEmail = localStorage.getItem('user_email');
            if(userEmail) {
                document.getElementById('user-display-email').innerText = userEmail;
            }

        } catch (e) { 
            console.error("Error cargando componentes del panel:", e); 
        }
    }
    document.addEventListener('DOMContentLoaded', cargarComponentes);
</script>
</body>
</html>
